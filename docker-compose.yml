services:
  postgres:
    image: postgres:16-alpine
    container_name: signing-postgres
    environment:
      POSTGRES_DB: signing_db
      POSTGRES_USER: signing_user
      POSTGRES_PASSWORD: signing_password
    ports:
      - "55433:5432"
    volumes:
      - signing_postgres_data:/var/lib/postgresql/data

volumes:
  signing_postgres_data: